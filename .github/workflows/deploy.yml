name: Deploy to Vercel

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Lint and test backend
  backend-checks:
    name: Backend Lint & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint code
        working-directory: backend
        run: npm run lint || echo "Linting completed with warnings"

      - name: Check TypeScript (if available)
        working-directory: backend
        run: npm run typecheck || echo "Type checking skipped"

  # Lint and test frontend
  frontend-checks:
    name: Frontend Lint & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint || echo "Linting completed with warnings"

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_STAGING }}

  # Deploy to Vercel
  deploy:
    name: Deploy to Vercel
    needs: [backend-checks, frontend-checks]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # Health check after deployment
  health-check:
    name: Health Check
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check backend health
        run: |
          max_attempts=10
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.VERCEL_BACKEND_URL }}/api/v1/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts - HTTP $HTTP_CODE"
            sleep 5
            attempt=$((attempt+1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1

      - name: Check frontend health
        run: |
          max_attempts=10
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.VERCEL_FRONTEND_URL }})
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend health check passed"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts - HTTP $HTTP_CODE"
            sleep 5
            attempt=$((attempt+1))
          done
          echo "❌ Health check failed after $max_attempts attempts"
          exit 1

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    needs: [health-check]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Notify deployment failure
        run: |
          echo "::error::Deployment failed. Check logs above for details."
          exit 1
